name: Build Windows Package
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed
jobs:
  build-windows:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    - name: Install dependencies
      run: |
        go mod download
        # Install walk dependencies
        go get github.com/lxn/walk
        go get github.com/lxn/win
    - name: Build Windows executable
      run: |
        # Build for Windows AMD64
        $env:GOOS="windows"
        $env:GOARCH="amd64"
        go build -ldflags="-s -w" -o ssh_manager.exe .
    - name: Verify build
      run: |
        if (Test-Path "ssh_manager.exe") {
          Write-Host "Build successful!"
          Get-Item ssh_manager.exe | Select-Object Name, Length, LastWriteTime
        } else {
          Write-Error "Build failed: ssh_manager.exe not found"
          exit 1
        }
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ssh-manager-windows
        path: ssh_manager.exe
        retention-days: 30
        if-no-files-found: error
